<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Antagonistic Robot</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    background: #16213e;
    padding: 16px 24px;
    border-bottom: 1px solid #333;
  }
  header h1 { font-size: 20px; font-weight: 600; }
  header h1 span { color: #e94560; }

  /* --- Settings Panel --- */
  .settings-panel {
    background: #16213e;
    padding: 12px 24px;
    display: flex;
    flex-wrap: wrap;
    align-items: flex-end;
    gap: 14px;
    border-bottom: 1px solid #333;
  }
  .control-group { display: flex; flex-direction: column; gap: 4px; }
  .control-group label { font-size: 12px; color: #aaa; white-space: nowrap; }
  .settings-panel input[type="text"] {
    background: #0f3460;
    border: 1px solid #444;
    color: #eee;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
    width: 120px;
  }
  .settings-panel select {
    background: #0f3460;
    border: 1px solid #444;
    color: #eee;
    padding: 6px 10px;
    border-radius: 4px;
    font-size: 14px;
  }

  /* Shared button row style */
  .btn-row { display: flex; gap: 3px; }

  /* Generic AVCT toggle button */
  .avct-btn {
    min-width: 34px;
    height: 32px;
    padding: 0 6px;
    border: 2px solid #444;
    border-radius: 5px;
    background: #0f3460;
    color: #ccc;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .avct-btn:hover { border-color: #e94560; }
  .avct-btn.active {
    background: #e94560;
    border-color: #e94560;
    color: #fff;
  }

  /* Polar-level buttons: each has a data-color used for active state */
  .polar-btn.active { background: var(--polar-clr); border-color: var(--polar-clr); color: #fff; }
  .polar-btn:hover { border-color: var(--polar-clr); }

  /* Risk badge */
  .risk-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.3px;
    height: 32px;
    align-self: flex-end;
  }
  .risk-badge.green  { background: #28a745; color: #fff; }
  .risk-badge.amber  { background: #ffc107; color: #1a1a2e; }
  .risk-badge.red    { background: #c62828; color: #fff; }

  /* Session controls */
  .session-controls {
    display: flex;
    gap: 8px;
    margin-left: auto;
    align-self: flex-end;
  }
  .btn {
    padding: 7px 16px;
    border: none;
    border-radius: 6px;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-start { background: #28a745; color: #fff; }
  .btn-stop { background: #e94560; color: #fff; }
  .btn-export { background: #0f3460; color: #eee; border: 1px solid #444; }

  /* --- Status Bar --- */
  .status-bar {
    background: #16213e;
    padding: 10px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    border-bottom: 1px solid #333;
    font-size: 13px;
  }
  .status-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
  }
  .status-dot.idle { background: #666; }
  .status-dot.listening { background: #28a745; }
  .status-dot.processing { background: #ffc107; }
  .status-dot.speaking { background: #007bff; }

  /* --- Conversation Log --- */
  .conversation-log {
    flex: 1;
    overflow-y: auto;
    padding: 16px 24px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .turn-entry {
    background: #16213e;
    border-radius: 8px;
    padding: 12px 16px;
    border-left: 3px solid #e94560;
  }
  .turn-number {
    font-size: 11px;
    color: #666;
    margin-bottom: 6px;
  }
  .user-text {
    color: #82b1ff;
    margin-bottom: 6px;
    font-size: 14px;
  }
  .user-text::before { content: "User: "; font-weight: 600; }
  .agent-text {
    color: #e94560;
    font-size: 14px;
  }
  .agent-text::before { content: "Agent: "; font-weight: 600; }
  .turn-meta {
    font-size: 11px;
    color: #666;
    margin-top: 6px;
    font-family: monospace;
  }

  /* --- Latency Bar --- */
  .latency-bar {
    background: #16213e;
    padding: 10px 24px;
    border-top: 1px solid #333;
    display: flex;
    gap: 24px;
    font-size: 12px;
    color: #888;
  }
  .latency-item span { color: #eee; font-weight: 500; }

  .empty-state {
    color: #555;
    text-align: center;
    margin-top: 80px;
    font-size: 15px;
  }
</style>
</head>
<body>

<header>
  <h1>Antagonistic <span>Robot</span></h1>
</header>

<div class="settings-panel">
  <!-- Row 1: Participant, Polar Level, Risk, Voice, Session controls -->
  <div class="control-group">
    <label>Participant ID</label>
    <input type="text" id="participantId" placeholder="e.g. P001">
  </div>

  <div class="control-group">
    <label>Polar Level</label>
    <div class="btn-row" id="polarButtons">
      <button class="avct-btn polar-btn" data-polar="-3" style="--polar-clr:#0097a7" title="Maximum Support">-3</button>
      <button class="avct-btn polar-btn" data-polar="-2" style="--polar-clr:#00acc1" title="Moderate Support">-2</button>
      <button class="avct-btn polar-btn" data-polar="-1" style="--polar-clr:#26c6da" title="Mild Support">-1</button>
      <button class="avct-btn polar-btn" data-polar="0"  style="--polar-clr:#666"    title="Neutral">0</button>
      <button class="avct-btn polar-btn" data-polar="1"  style="--polar-clr:#f9a825" title="Mild Hostility">+1</button>
      <button class="avct-btn polar-btn active" data-polar="2"  style="--polar-clr:#ef6c00" title="Moderate Hostility">+2</button>
      <button class="avct-btn polar-btn" data-polar="3"  style="--polar-clr:#c62828" title="Maximum Hostility">+3</button>
    </div>
  </div>

  <div class="risk-badge green" id="riskBadge">Green</div>

  <div class="control-group">
    <label>Voice</label>
    <select id="voiceSelect"><option>Loading...</option></select>
  </div>

  <div class="session-controls">
    <button class="btn btn-start" id="startBtn">Start Session</button>
    <button class="btn btn-stop" id="stopBtn" disabled>End Session</button>
    <button class="btn btn-export" id="exportBtn" disabled>Export</button>
  </div>

  <!-- Row 2: Category, Subtype, Modifiers -->
  <div class="control-group">
    <label>Category</label>
    <div class="btn-row" id="categoryButtons">
      <button class="avct-btn" data-cat="B" title="Dismissive">B</button>
      <button class="avct-btn" data-cat="C" title="Sarcastic">C</button>
      <button class="avct-btn active" data-cat="D" title="Confrontational">D</button>
      <button class="avct-btn" data-cat="E" title="Passive-Aggressive">E</button>
      <button class="avct-btn" data-cat="F" title="Aggressive">F</button>
      <button class="avct-btn" data-cat="G" title="Extreme">G</button>
    </div>
  </div>

  <div class="control-group">
    <label>Subtype</label>
    <div class="btn-row" id="subtypeButtons">
      <button class="avct-btn" data-sub="1">1</button>
      <button class="avct-btn active" data-sub="2">2</button>
      <button class="avct-btn" data-sub="3">3</button>
    </div>
  </div>

  <div class="control-group">
    <label>Modifiers</label>
    <div class="btn-row" id="modifierButtons">
      <button class="avct-btn" data-mod="M1" title="Interrupting">M1</button>
      <button class="avct-btn" data-mod="M2" title="Gaslighting">M2</button>
      <button class="avct-btn" data-mod="M3" title="Deflecting">M3</button>
      <button class="avct-btn" data-mod="M4" title="Condescending">M4</button>
      <button class="avct-btn" data-mod="M5" title="Threatening">M5</button>
      <button class="avct-btn" data-mod="M6" title="Silent Treatment">M6</button>
    </div>
  </div>
</div>

<div class="status-bar">
  <span class="status-dot idle" id="statusDot"></span>
  <span id="statusText">Idle</span>
  <span style="margin-left: auto;">
    Turn: <span id="turnCount">0</span> |
    Time: <span id="elapsedTime">0:00</span>
  </span>
</div>

<div class="conversation-log" id="conversationLog">
  <div class="empty-state" id="emptyState">
    Start a session to begin the conversation.
  </div>
</div>

<div class="latency-bar" id="latencyBar">
  <div class="latency-item">VAD: <span id="latVad">--</span>ms</div>
  <div class="latency-item">ASR: <span id="latAsr">--</span>ms</div>
  <div class="latency-item">LLM: <span id="latLlm">--</span>ms</div>
  <div class="latency-item">TTS: <span id="latTts">--</span>ms</div>
  <div class="latency-item">Total: <span id="latTotal">--</span>ms</div>
</div>

<script>
  // --- State ---
  let selectedPolarLevel = 2;
  let selectedCategory = 'D';
  let selectedSubtype = 2;
  let selectedModifiers = [];
  let sessionActive = false;
  let currentSessionId = null;
  let ws = null;
  let statusPollInterval = null;

  // --- DOM ---
  const participantId = document.getElementById('participantId');
  const voiceSelect = document.getElementById('voiceSelect');
  const startBtn = document.getElementById('startBtn');
  const stopBtn = document.getElementById('stopBtn');
  const exportBtn = document.getElementById('exportBtn');
  const statusDot = document.getElementById('statusDot');
  const statusText = document.getElementById('statusText');
  const turnCount = document.getElementById('turnCount');
  const elapsedTime = document.getElementById('elapsedTime');
  const conversationLog = document.getElementById('conversationLog');
  const emptyState = document.getElementById('emptyState');
  const riskBadge = document.getElementById('riskBadge');

  // --- Risk Rating (mirrors backend logic) ---
  function getRiskRating() {
    if (selectedPolarLevel >= 3 || selectedCategory === 'G') return 'Red';
    if (selectedPolarLevel === 2 && ['B', 'C', 'E'].includes(selectedCategory)) return 'Amber';
    // Negative polar levels (supportive range) and all other combinations are Green
    return 'Green';
  }

  function updateRiskBadge() {
    var rating = getRiskRating();
    riskBadge.textContent = rating;
    riskBadge.className = 'risk-badge ' + rating.toLowerCase();
  }

  // --- Send settings to backend (mid-session) ---
  function sendSettings() {
    if (!sessionActive) return;
    fetch('/api/settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        polar_level: selectedPolarLevel,
        category: selectedCategory,
        subtype: selectedSubtype,
        modifiers: selectedModifiers
      })
    });
  }

  // --- Polar Level Buttons (single-select) ---
  document.querySelectorAll('.polar-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectedPolarLevel = parseInt(btn.dataset.polar);
      document.querySelectorAll('.polar-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      updateRiskBadge();
      sendSettings();
    });
  });

  // --- Category Buttons (single-select) ---
  document.querySelectorAll('#categoryButtons .avct-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectedCategory = btn.dataset.cat;
      document.querySelectorAll('#categoryButtons .avct-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      updateRiskBadge();
      sendSettings();
    });
  });

  // --- Subtype Buttons (single-select) ---
  document.querySelectorAll('#subtypeButtons .avct-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      selectedSubtype = parseInt(btn.dataset.sub);
      document.querySelectorAll('#subtypeButtons .avct-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      sendSettings();
    });
  });

  // --- Modifier Buttons (multi-select toggle) ---
  document.querySelectorAll('#modifierButtons .avct-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      var mod = btn.dataset.mod;
      var idx = selectedModifiers.indexOf(mod);
      if (idx === -1) {
        selectedModifiers.push(mod);
        btn.classList.add('active');
      } else {
        selectedModifiers.splice(idx, 1);
        btn.classList.remove('active');
      }
      sendSettings();
    });
  });

  // Initialize risk badge on load
  updateRiskBadge();

  // --- Load Voices ---
  async function loadVoices() {
    try {
      const res = await fetch('/api/voices');
      const voices = await res.json();
      voiceSelect.innerHTML = voices.map(v =>
        `<option value="${v.name}">${v.name} (${v.gender})</option>`
      ).join('');
    } catch (e) {
      voiceSelect.innerHTML = '<option>Error loading voices</option>';
    }
  }
  loadVoices();

  // --- Start Session ---
  startBtn.addEventListener('click', async () => {
    const pid = participantId.value.trim() || 'anonymous';
    try {
      const res = await fetch('/api/session/start', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          participant_id: pid,
          polar_level: selectedPolarLevel,
          category: selectedCategory,
          subtype: selectedSubtype,
          modifiers: selectedModifiers
        })
      });
      const data = await res.json();
      if (res.ok) {
        sessionActive = true;
        currentSessionId = data.session_id;
        startBtn.disabled = true;
        stopBtn.disabled = false;
        exportBtn.disabled = true;
        emptyState.style.display = 'none';
        conversationLog.innerHTML = '';
        connectWebSocket();
        startStatusPoll();
      } else {
        alert(data.error || 'Failed to start session');
      }
    } catch (e) {
      alert('Error starting session: ' + e.message);
    }
  });

  // --- Stop Session ---
  stopBtn.addEventListener('click', async () => {
    try {
      await fetch('/api/session/stop', { method: 'POST' });
      sessionEnded();
    } catch (e) {
      alert('Error stopping session: ' + e.message);
    }
  });

  function sessionEnded() {
    sessionActive = false;
    startBtn.disabled = false;
    stopBtn.disabled = true;
    exportBtn.disabled = false;
    stopStatusPoll();
    updateStatusUI('idle');
  }

  // --- Export ---
  exportBtn.addEventListener('click', () => {
    if (currentSessionId) {
      window.open(`/api/sessions/${currentSessionId}/export`, '_blank');
    }
  });

  // --- WebSocket ---
  function connectWebSocket() {
    const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${protocol}//${window.location.host}/ws/conversation`);

    ws.onmessage = (event) => {
      const data = JSON.parse(event.data);

      if (data.type === 'turn_complete') {
        addTurn(data);
        updateLatency(data.latency);
        turnCount.textContent = data.turn_number;
      } else if (data.type === 'state_change') {
        updateStatusUI(data.state);
        turnCount.textContent = data.turn_count;
        updateElapsed(data.elapsed_seconds);
      } else if (data.type === 'session_ended') {
        sessionEnded();
      } else if (data.type === 'error') {
        addError(data.message);
        sessionEnded();
      }
    };

    ws.onclose = () => {
      if (sessionActive) {
        setTimeout(connectWebSocket, 2000);
      }
    };
  }

  // --- Status Polling ---
  function startStatusPoll() {
    statusPollInterval = setInterval(async () => {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        updateStatusUI(data.state);
        turnCount.textContent = data.turn_count;
        updateElapsed(data.elapsed_seconds);
      } catch (e) {}
    }, 1000);
  }

  function stopStatusPoll() {
    if (statusPollInterval) {
      clearInterval(statusPollInterval);
      statusPollInterval = null;
    }
  }

  // --- UI Updates ---
  function updateStatusUI(state) {
    statusDot.className = 'status-dot ' + state;
    const labels = { idle: 'Idle', listening: 'Listening...', processing: 'Processing...', speaking: 'Speaking...' };
    statusText.textContent = labels[state] || state;
  }

  function updateElapsed(seconds) {
    const m = Math.floor(seconds / 60);
    const s = Math.floor(seconds % 60);
    elapsedTime.textContent = `${m}:${s.toString().padStart(2, '0')}`;
  }

  function addTurn(data) {
    var polar = data.polar_level;
    var polarStr = (polar >= 0 ? '+' : '') + polar;
    var cat = data.category || '';
    var sub = data.subtype || '';
    var risk = data.risk_rating || '';

    const div = document.createElement('div');
    div.className = 'turn-entry';
    div.innerHTML =
      '<div class="turn-number">Turn ' + escapeHtml(String(data.turn_number)) + '</div>' +
      '<div class="user-text">' + escapeHtml(data.transcript) + '</div>' +
      '<div class="agent-text">' + escapeHtml(data.response) + '</div>' +
      '<div class="turn-meta">Polar: ' + escapeHtml(polarStr) + ' | Cat: ' + escapeHtml(cat + sub) + ' | Risk: ' + escapeHtml(risk) + '</div>';
    conversationLog.appendChild(div);
    conversationLog.scrollTop = conversationLog.scrollHeight;
  }

  function addError(message) {
    const div = document.createElement('div');
    div.className = 'turn-entry';
    div.style.borderLeftColor = '#ffc107';
    div.innerHTML = `<div style="color:#ffc107;">Error: ${escapeHtml(message)}</div>`;
    conversationLog.appendChild(div);
    conversationLog.scrollTop = conversationLog.scrollHeight;
  }

  function updateLatency(latency) {
    if (!latency) return;
    document.getElementById('latVad').textContent = latency.vad_ms ?? '--';
    document.getElementById('latAsr').textContent = latency.asr_ms ?? '--';
    document.getElementById('latLlm').textContent = latency.llm_ms ?? '--';
    document.getElementById('latTts').textContent = latency.tts_ms ?? '--';
    document.getElementById('latTotal').textContent = latency.total_ms ?? '--';
  }

  function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
  }
</script>
</body>
</html>
