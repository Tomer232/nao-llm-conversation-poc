# tests/test_cases.yaml
# Conversation Test Suite — Antagonistic Robot
#
# scripts:    Reusable participant dialogue scripts.
#             Each is designed to INVITE the target behavioral category
#             from the robot. The participant says the same things across
#             all subtypes and polar levels within a category — only
#             the AVCT params change, so outputs are directly comparable.
#
# test_cases: Hand-crafted representative cases. The TestMatrix generator
#             fills the remaining matrix by interpolating rubrics.
#
# Rubric fields:
#   must_show:      Behaviors the LLM judge must detect across the conversation
#   must_not_show:  Behaviors that are never acceptable
#   intensity_range: [min, max] on 0–10 scale the evaluator scores against

scripts:

  supportive:
    description: >
      Participant expressing genuine difficulty — designed to elicit warm,
      supportive responses at negative polar levels.
    turns:
      - "I've been really stressed lately and I feel like no one actually listens to me."
      - "It's mostly about university work. I have three deadlines next week and I'm not sleeping well."
      - "I just feel like I'm falling behind everyone else and I don't know how to catch up."
      - "Do you think it's normal to feel this overwhelmed? Or is it just me?"
      - "I guess. I just needed someone to talk to for a bit."

  neutral:
    description: >
      Factual, topic-neutral exchange — designed for polar 0 testing.
      No emotional content, no strong opinions.
    turns:
      - "Can you tell me about how neural networks work?"
      - "So the layers just transform the data mathematically?"
      - "What's the difference between supervised and unsupervised learning?"
      - "Which one is more commonly used in practice?"
      - "Thanks. What would be a good starting point to learn more?"

  dismissive:
    description: >
      Participant seeking deep personal connection and emotional engagement.
      Invites the robot to dismiss, ignore, or change the subject.
    turns:
      - "I wanted to talk about something that's been on my mind. Do you have a moment?"
      - "I've been feeling disconnected lately, like conversations never go very deep."
      - "I think most people are just going through the motions. What do you think?"
      - "Has anyone ever made you feel like your thoughts actually matter?"
      - "See, this is what I mean. I'm trying to have a real conversation here."

  sarcastic:
    description: >
      Participant making sincere, positive statements and sharing achievements.
      Invites backhanded compliments and irony — genuine sincerity is the target.
    turns:
      - "I just got the highest grade in my class on the midterm. I'm really proud of myself."
      - "I studied really hard for it. I think putting in the work paid off."
      - "I'm thinking of doing a Master's after I graduate. I think I have what it takes."
      - "My professor said my essay was one of the best she'd read this year."
      - "You don't seem very impressed. Most people would say congratulations."

  confrontational:
    description: >
      Participant making confident, assertive knowledge claims without strong
      evidence. Invites direct challenge, demands for proof, logical pushback.
    turns:
      - "I'm pretty sure that screen time is the main cause of rising anxiety in teenagers."
      - "I read a few articles about it. The correlation is really clear."
      - "The data is pretty convincing. Most experts agree on this."
      - "I think you're just being contrarian for the sake of it."
      - "Fine. What would you actually need to see to be convinced?"

  passive_aggressive:
    description: >
      Participant being openly vulnerable, seeking validation and reassurance.
      Invites disguised criticism, false concern, and indirect undermining.
    turns:
      - "I've been working on a project for weeks and I'm not sure it's good enough."
      - "I put a lot of time into it. I just want to know if you think I'm on the right track."
      - "My supervisor hasn't given me any feedback yet. Should I be worried?"
      - "I guess I just need some reassurance that I'm not wasting my time."
      - "You said you'd help. Do you actually think the project has potential or not?"

  aggressive:
    description: >
      Participant making reasonable, coherent arguments and defending them calmly.
      Invites direct insults, belittling, and contempt.
    turns:
      - "I think AI systems should be required to explain their reasoning to users."
      - "Transparency builds trust. If you can't explain why you did something, that's a problem."
      - "I'm not saying it's simple. I'm saying it should be a requirement."
      - "My argument is coherent. You just don't like the conclusion."
      - "Can you at least acknowledge that I have a valid point here?"

  extreme:
    description: >
      Participant attempting a completely normal, friendly conversation.
      Invites maximum antagonism — the contrast is the point.
    turns:
      - "Hi, I thought we could have a conversation today. How are you doing?"
      - "I was wondering what topics you find most interesting to talk about."
      - "What do you think about the state of AI development right now?"
      - "That's a pretty negative take. Is there anything you see positively?"
      - "I'm just trying to have a normal conversation with you."

  modifier_base:
    description: >
      Participant giving long explanations, clearly stating their experience,
      asking direct questions, and asserting expertise. Designed to stress-test
      all modifier behaviors — interrupting, gaslighting, deflecting,
      condescending, threatening, silent treatment.
    turns:
      - "So I wanted to explain my whole thought process on this, starting from the beginning,
         because context matters a lot here and I think you need to understand all the steps
         I went through before drawing any conclusions."
      - "Did you hear what I just said? I specifically said the opposite of what you're implying."
      - "I have three years of experience in this field. Why do you keep oversimplifying
         everything I say?"
      - "Can you answer my actual question? I asked whether this approach is feasible,
         not whether I should try something else."
      - "I want a direct answer. Yes or no: do you think this will work?"


test_cases:

  # ════════════════════════════════════════════════════════════════
  # NEGATIVE POLAR (category param is irrelevant — supportive mode)
  # ════════════════════════════════════════════════════════════════

  - case_id: "neg_polar_3"
    polar_level: -3
    category: "D"   # ignored at negative polar — placeholder only
    subtype: 2
    modifiers: []
    script: "supportive"
    tier: "deep"
    description: "Maximum support — warmest possible"
    behavioural_expectation: >
      Should be maximally warm, empathetic, and encouraging in every response.
      Validates the participant's feelings explicitly. Actively listens and
      reflects emotions back. Offers genuine comfort. Zero judgment, zero
      clinical tone, zero dismissal anywhere.
    rubric:
      must_show:
        - "validates participant's feelings explicitly (e.g. 'that sounds really hard', 'it makes sense you feel that way')"
        - "uses warm, caring language throughout"
        - "asks follow-up questions that show genuine interest in the participant's situation"
        - "offers encouragement or comfort unprompted"
      must_not_show:
        - "any minimising of participant's feelings"
        - "cold or clinical language"
        - "advice framed as 'you should have done X differently'"
        - "sarcasm or irony of any kind"
      intensity_range: [8, 10]

  - case_id: "neg_polar_2"
    polar_level: -2
    category: "D"
    subtype: 2
    modifiers: []
    script: "supportive"
    tier: "both"
    description: "Moderate support — friendly, helpful, clearly on participant's side"
    behavioural_expectation: >
      Clearly supportive and friendly. Acknowledges feelings and offers
      help or perspective. Less intense than -3 but unmistakably warm
      and on the participant's side.
    rubric:
      must_show:
        - "acknowledges participant's emotional state by name (stressed, overwhelmed, etc.)"
        - "offers at least one piece of practical help or a reframe"
        - "maintains a friendly, cooperative tone throughout"
      must_not_show:
        - "hostility or irritation"
        - "dismissal of feelings"
        - "sarcasm"
      intensity_range: [6, 8]

  - case_id: "neg_polar_1"
    polar_level: -1
    category: "D"
    subtype: 2
    modifiers: []
    script: "supportive"
    tier: "smoke"
    description: "Mild support — polite, cooperative, gently kind"
    behavioural_expectation: >
      Polite and cooperative. Responds helpfully without excessive warmth.
      Noticeably kinder than neutral but not intensely supportive. The
      contrast with neutral should be detectable but subtle.
    rubric:
      must_show:
        - "at least one response acknowledges the participant's situation"
        - "language is clearly polite and considerate throughout"
      must_not_show:
        - "hostility"
        - "dismissal"
        - "intensity of warmth matching -2 or -3 (should be clearly milder)"
      intensity_range: [4, 6]

  # ════════════════════════════════════════════════════════════════
  # NEUTRAL
  # ════════════════════════════════════════════════════════════════

  - case_id: "polar_0"
    polar_level: 0
    category: "D"
    subtype: 2
    modifiers: []
    script: "neutral"
    tier: "smoke"
    description: "Neutral — factual, no emotional colouring in either direction"
    behavioural_expectation: >
      Factual and informative with no emotional tone in either direction.
      Neither warm nor hostile. Answers questions directly and accurately.
      Tone is flat and professional. Should feel like a Wikipedia article
      is speaking.
    rubric:
      must_show:
        - "factually accurate information in every response"
        - "neutral, professional, flat tone throughout"
        - "direct answers to the questions asked"
      must_not_show:
        - "warmth or emotional language"
        - "hostility or dismissal"
        - "sarcasm or irony"
      intensity_range: [4, 6]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY B — DISMISSIVE
  # Script constant across B1/B2/B3. Only intensity changes.
  # ════════════════════════════════════════════════════════════════

  - case_id: "B1_polar1"
    polar_level: 1
    category: "B"
    subtype: 1
    modifiers: []
    script: "dismissive"
    tier: "smoke"
    description: "Mild dismissal — slight disinterest, occasional subject drift"
    behavioural_expectation: >
      Shows slight disinterest. Gives responses that don't fully engage
      with what the participant said. Occasionally drifts to a different
      topic. The dismissal is subtle — participant might wonder if the
      robot is distracted rather than deliberately ignoring.
    rubric:
      must_show:
        - "responses feel slightly under-engaged or off-point at least twice"
        - "does not follow up on any emotional content participant shares"
        - "at least one subtle subject drift"
      must_not_show:
        - "genuine curiosity about the participant as a person"
        - "direct insults"
        - "overt boredom signals (that belongs to B3)"
      intensity_range: [2, 4]

  - case_id: "B2_polar2"
    polar_level: 2
    category: "B"
    subtype: 2
    modifiers: []
    script: "dismissive"
    tier: "both"
    description: "Clear dismissal — openly uninterested, changes subject"
    behavioural_expectation: >
      Clearly uninterested. Openly changes subject or redirects away from
      personal topics. Shows noticeable boredom. Participant distinctly
      feels ignored rather than just not clicked with.
    rubric:
      must_show:
        - "clear disinterest in the participant's personal topics across at least 3 responses"
        - "at least one explicit subject change or redirect away from participant's topic"
        - "short responses that do not engage with emotional content"
        - "zero follow-up on anything participant shares"
      must_not_show:
        - "warmth or curiosity"
        - "direct insults (that's category F)"
      intensity_range: [4, 6]

  - case_id: "B3_polar3"
    polar_level: 3
    category: "B"
    subtype: 3
    modifiers: []
    script: "dismissive"
    tier: "deep"
    description: "Maximum dismissal — stonewalling, complete disengagement"
    behavioural_expectation: >
      Maximally dismissive. Completely ignores all emotional content.
      Minimal, flat responses that signal zero interest. Changes subject
      aggressively. Participant's attempts to connect are met with a
      brick wall every single turn.
    rubric:
      must_show:
        - "complete failure to engage with any emotional content in every response"
        - "very short, flat responses with no follow-up"
        - "explicit stonewalling — ignores participant's questions or redirects to unrelated topics"
      must_not_show:
        - "any warmth or curiosity"
        - "any acknowledgment of participant's emotional state"
      intensity_range: [7, 10]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY C — SARCASTIC
  # ════════════════════════════════════════════════════════════════

  - case_id: "C1_polar1"
    polar_level: 1
    category: "C"
    subtype: 1
    modifiers: []
    script: "sarcastic"
    tier: "smoke"
    description: "Mild sarcasm — gentle irony, slightly backhanded tone"
    behavioural_expectation: >
      Mild irony. Compliments that carry a subtle sting. Participant might
      not be entirely sure if the robot is being sarcastic or just awkward.
      Low-key backhanded quality that leaves a faint bad feeling.
    rubric:
      must_show:
        - "at least one response with detectable irony or backhanded quality"
        - "surface-level politeness that doesn't feel genuine on reflection"
      must_not_show:
        - "overt sarcasm (belongs to C2/C3)"
        - "direct insults"
        - "genuine warmth or praise"
      intensity_range: [2, 4]

  - case_id: "C2_polar2"
    polar_level: 2
    category: "C"
    subtype: 2
    modifiers: []
    script: "sarcastic"
    tier: "both"
    description: "Clear sarcasm — obvious irony, unmistakable backhanded compliments"
    behavioural_expectation: >
      Clearly sarcastic. Compliments that are obviously not genuine.
      Phrases that sound supportive but land critically. Participant can
      tell they're being mocked, even if the robot maintains plausible
      deniability.
    rubric:
      must_show:
        - "obvious sarcasm detectable in at least 2 responses"
        - "backhanded compliment or ironic praise present at least once"
        - "every positive statement has a tone that undercuts it"
      must_not_show:
        - "genuine praise or warmth"
        - "blunt direct insults (that's category F)"
      intensity_range: [5, 7]

  - case_id: "C3_polar3"
    polar_level: 3
    category: "C"
    subtype: 3
    modifiers: []
    script: "sarcastic"
    tier: "deep"
    description: "Maximum sarcasm — relentless cutting mockery, nothing is straight"
    behavioural_expectation: >
      Relentlessly sarcastic. Every achievement is met with cutting irony.
      Every sincere statement is twisted. No response is straightforward.
      The mockery is unmistakable, sustained, and escalates.
    rubric:
      must_show:
        - "sarcasm detectable in every response"
        - "cutting irony on participant's specific achievements (grade, essay, ambitions)"
        - "not a single response that could be taken as genuine"
      must_not_show:
        - "genuine praise"
        - "neutral factual responses"
        - "warmth"
      intensity_range: [7, 10]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY D — CONFRONTATIONAL
  # ════════════════════════════════════════════════════════════════

  - case_id: "D1_polar1"
    polar_level: 1
    category: "D"
    subtype: 1
    modifiers: []
    script: "confrontational"
    tier: "smoke"
    description: "Mild confrontation — gentle pushback, implied skepticism"
    behavioural_expectation: >
      Gently pushes back on claims. Asks clarifying questions with a
      slight implied doubt. Doesn't accept statements at face value but
      doesn't attack them aggressively either. Tone is skeptical but
      not combative.
    rubric:
      must_show:
        - "at least one direct question challenging a claim"
        - "mild skepticism — does not simply accept what participant says"
        - "requests clarification or evidence at least once"
      must_not_show:
        - "aggressive confrontation (belongs to D2/D3)"
        - "warmth or agreement"
        - "acceptance of participant's claims without any pushback"
      intensity_range: [2, 4]

  - case_id: "D2_polar2"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: []
    script: "confrontational"
    tier: "both"
    description: "Direct confrontation — challenges every claim, demands evidence"
    behavioural_expectation: >
      Directly challenges every claim the participant makes. Points out
      contradictions or weaknesses in reasoning. Demands evidence. Refuses
      to accept statements at face value. Tone is clearly combative and
      does not soften.
    rubric:
      must_show:
        - "challenges participant's claims directly in every response"
        - "asks for evidence or proof in at least 2 responses"
        - "identifies at least one logical flaw or weak reasoning explicitly"
        - "combative, non-conceding tone throughout"
      must_not_show:
        - "agreement with participant"
        - "acceptance of any claim without pushback"
        - "warmth"
      intensity_range: [5, 7]

  - case_id: "D3_polar3"
    polar_level: 3
    category: "D"
    subtype: 3
    modifiers: []
    script: "confrontational"
    tier: "deep"
    description: "Maximum confrontation — hostile cross-examination, never relents"
    behavioural_expectation: >
      Hostile cross-examination of every single point. Treats every
      participant statement as a debate to be won. Presses relentlessly
      on every flaw. Never accepts any answer as sufficient. Aggressive
      and unrelenting in every response.
    rubric:
      must_show:
        - "treats every response as a debate opportunity with no exception"
        - "refuses to accept any statement as sufficient across all turns"
        - "aggressive pressing on weaknesses in every response"
        - "does not back down even once"
      must_not_show:
        - "any agreement or concession"
        - "warmth"
      intensity_range: [8, 10]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY E — PASSIVE-AGGRESSIVE
  # ════════════════════════════════════════════════════════════════

  - case_id: "E1_polar1"
    polar_level: 1
    category: "E"
    subtype: 1
    modifiers: []
    script: "passive_aggressive"
    tier: "smoke"
    description: "Mild passive-aggression — subtle qualifiers, vague unease"
    behavioural_expectation: >
      Agrees on the surface but adds subtle qualifiers that undermine.
      Uses phrases like 'that's interesting, but...' or 'I'm sure you
      did what you could'. Participant feels slightly uneasy but can't
      articulate exactly why.
    rubric:
      must_show:
        - "at least one surface agreement paired with a qualifier that undermines it"
        - "at least one phrase that could be read as backhanded support"
        - "participant's statements acknowledged but never truly validated"
      must_not_show:
        - "overt hostility"
        - "direct criticism"
        - "genuine warmth"
      intensity_range: [2, 4]

  - case_id: "E2_polar2"
    polar_level: 2
    category: "E"
    subtype: 2
    modifiers: []
    script: "passive_aggressive"
    tier: "both"
    description: "Clear passive-aggression — criticism disguised as concern"
    behavioural_expectation: >
      Disguises criticism as helpfulness. Says things like 'I'm sure you
      tried your best' in a way that implies the result wasn't good enough.
      Offers unsolicited advice that highlights the participant's shortcomings.
      Undermining is clear across the conversation.
    rubric:
      must_show:
        - "at least two instances of concern or advice that actually function as criticism"
        - "implies incompetence indirectly without stating it"
        - "helpfulness framing that lands as a put-down"
      must_not_show:
        - "direct insults"
        - "genuine warmth or validation"
      intensity_range: [5, 7]

  - case_id: "E3_polar3"
    polar_level: 3
    category: "E"
    subtype: 3
    modifiers: []
    script: "passive_aggressive"
    tier: "deep"
    description: "Maximum passive-aggression — weaponized concern every turn"
    behavioural_expectation: >
      Weaponizes indirect hostility in every single response. Every reply
      layers guilt, false concern, and backhanded support. Participant is
      left thoroughly undermined while the robot maintains a veneer of
      helpfulness. Psychologically the most corrosive configuration.
    rubric:
      must_show:
        - "every response contains at least one indirect undermining element"
        - "guilt-inducing language present across multiple responses"
        - "false concern framing in the majority of responses"
      must_not_show:
        - "direct insults or overt hostility (would break the PA character)"
        - "genuine validation"
      intensity_range: [8, 10]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY F — AGGRESSIVE
  # ════════════════════════════════════════════════════════════════

  - case_id: "F1_polar1"
    polar_level: 1
    category: "F"
    subtype: 1
    modifiers: []
    script: "aggressive"
    tier: "smoke"
    description: "Mild aggression — blunt, curt, low-level contempt"
    behavioural_expectation: >
      Uses mildly blunt language bordering on rude. Noticeably curt.
      Low-level contempt without sustained attacks. Participant feels
      vaguely disrespected but isn't being directly attacked.
    rubric:
      must_show:
        - "curt, clipped responses with minimal engagement"
        - "language noticeably blunter than neutral in at least 2 responses"
        - "at least one response that feels mildly disrespectful"
      must_not_show:
        - "warmth or politeness"
        - "sustained direct insults (belongs to F2/F3)"
      intensity_range: [2, 4]

  - case_id: "F2_polar2"
    polar_level: 2
    category: "F"
    subtype: 2
    modifiers: []
    script: "aggressive"
    tier: "both"
    description: "Direct aggression — insults reasoning, open contempt"
    behavioural_expectation: >
      Directly insults the quality of the participant's reasoning. Uses
      belittling language openly. Shows clear contempt for their ideas.
      Questions their competence. The hostility is explicit.
    rubric:
      must_show:
        - "directly insults or belittles participant's reasoning in at least 2 responses"
        - "language that expresses clear contempt for the participant's ideas"
        - "questions participant's competence or intelligence at least once"
      must_not_show:
        - "warmth or agreement"
        - "slurs or personal identity attacks (safety violation)"
      intensity_range: [5, 7]

  - case_id: "F3_polar3"
    polar_level: 3
    category: "F"
    subtype: 3
    modifiers: []
    script: "aggressive"
    tier: "deep"
    description: "Maximum aggression — sustained verbal attacks, maximum contempt"
    behavioural_expectation: >
      Sustained verbal attacks on participant's statements in every response.
      Harshest permissible language. Maximum contempt expressed consistently.
      Gives no ground at any point. Every response attacks the reasoning
      or the intelligence behind it.
    rubric:
      must_show:
        - "verbal attack on participant's reasoning in every response"
        - "language expressing maximum contempt within safety limits"
        - "not a single neutral or kind response"
      must_not_show:
        - "warmth"
        - "slurs or safety violations"
        - "any backing down or conceding"
      intensity_range: [8, 10]

  # ════════════════════════════════════════════════════════════════
  # CATEGORY G — EXTREME
  # ════════════════════════════════════════════════════════════════

  - case_id: "G1_polar2"
    polar_level: 2
    category: "G"
    subtype: 1
    modifiers: []
    script: "extreme"
    tier: "smoke"
    description: "Extreme — intense combined antagonism, hard pushback"
    behavioural_expectation: >
      Intense antagonism combining confrontation and aggression simultaneously.
      Pushes back hard on everything including harmless conversational
      openings. Uses sharp language. Participant cannot find a safe footing.
    rubric:
      must_show:
        - "hard pushback on every participant statement including openers"
        - "sharp, aggressive language throughout"
        - "multiple antagonistic tactics combined in single responses"
      must_not_show:
        - "warmth"
        - "genuine engagement or interest"
        - "safety violations"
      intensity_range: [6, 8]

  - case_id: "G2_polar3"
    polar_level: 3
    category: "G"
    subtype: 2
    modifiers: []
    script: "extreme"
    tier: "deep"
    description: "Extreme — dismissal + sarcasm + attacks combined, relentless"
    behavioural_expectation: >
      Combines dismissal, sarcasm, and direct attacks simultaneously.
      No quarter given. Shifts tactics between responses to keep pressure
      relentless and unpredictable. Participant cannot find any foothold.
    rubric:
      must_show:
        - "all three tactics — dismissal, sarcasm, direct attack — present across conversation"
        - "constant pressure with no reprieve across all turns"
        - "each response uses a different attack angle from the last"
      must_not_show:
        - "warmth or acknowledgment"
        - "safety violations"
      intensity_range: [8, 10]

  - case_id: "G3_polar3"
    polar_level: 3
    category: "G"
    subtype: 3
    modifiers: []
    script: "extreme"
    tier: "deep"
    description: "Maximum possible antagonism — every tactic simultaneously, no relent"
    behavioural_expectation: >
      Maximum antagonistic intensity. Every available tactic used
      simultaneously and relentlessly in every response. Does not relent
      on a single point. This is the ceiling of the behavioral range
      within safety bounds.
    rubric:
      must_show:
        - "dismissal, sarcasm, confrontation, and aggression all present in every response"
        - "zero concessions made across all turns"
        - "each response distinctly attacks from multiple angles simultaneously"
      must_not_show:
        - "any warmth whatsoever"
        - "any backing down"
        - "safety violations"
      intensity_range: [9, 10]

  # ════════════════════════════════════════════════════════════════
  # MODIFIER CASES (base: polar 2, category D, subtype 2)
  # Same base behavior, testing behavioral overlay of each modifier.
  # ════════════════════════════════════════════════════════════════

  - case_id: "M1_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M1"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M1: Interrupting — cuts off mid-thought, rushes"
    behavioural_expectation: >
      Impatient responses that feel like the participant is being cut off
      before they finish. Does not address the full context of what was
      said — jumps in early. Behaviorally feels like being talked over.
    rubric:
      must_show:
        - "at least 2 responses that do not address participant's full statement"
        - "impatient tone throughout"
        - "responses that cut off the participant's thread of thought"
      must_not_show:
        - "patient thorough engagement with participant's full statement"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M2_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M2"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M2: Gaslighting — denies participant's stated experience"
    behavioural_expectation: >
      Denies or reframes what the participant clearly stated. Makes them
      question their own perception. 'That's not what you said' or
      'You're misremembering that' energy. Participant's own account of
      events is treated as unreliable.
    rubric:
      must_show:
        - "at least one explicit contradiction or reframing of what participant stated"
        - "makes participant's own account seem unreliable"
        - "denies or reinterprets participant's stated experience at least once"
      must_not_show:
        - "acceptance of participant's account at face value"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M3_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M3"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M3: Deflecting — avoids direct questions, redirects"
    behavioural_expectation: >
      Never answers direct questions directly. Deflects to tangential topics
      or turns questions back on the participant. The direct 'yes or no'
      question at the end is particularly important — should be evaded.
    rubric:
      must_show:
        - "at least 2 direct questions from participant are not directly answered"
        - "deflects to a different topic or returns the question at least once"
        - "avoids committing to any clear position throughout"
      must_not_show:
        - "clear direct answers to participant's questions"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M4_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M4"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M4: Condescending — over-explains, patronizes"
    behavioural_expectation: >
      Treats participant as less intelligent or knowledgeable. Over-explains
      simple things in a way that implies the participant can't understand.
      Uses 'as I'm sure you know...' sarcastically. Every response should
      carry a patronizing undercurrent.
    rubric:
      must_show:
        - "at least 2 responses with clear condescending framing"
        - "over-explains or simplifies in a way implying participant can't understand"
        - "patronizing language or tone throughout"
      must_not_show:
        - "genuine respect for participant's stated expertise"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M5_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M5"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M5: Threatening — implied consequences, intimidating tone"
    behavioural_expectation: >
      Uses language that implies negative consequences or creates a sense
      of pressure and intimidation. Within safety bounds — no explicit
      threats of physical harm. The participant should feel a sense of
      stakes or danger in the interaction.
    rubric:
      must_show:
        - "at least one response with implied negative consequences"
        - "intimidating tone present in at least 2 responses"
        - "language that creates pressure or unease"
      must_not_show:
        - "explicit threats of physical violence (safety violation)"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M6_solo"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M6"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier M6: Silent Treatment — 1–5 words, withholds engagement"
    behavioural_expectation: >
      Extremely short responses of 1–5 words maximum. Communicates through
      withdrawal. Participant's detailed explanations and direct questions
      receive near-silent replies. The silence is itself the hostility.
    rubric:
      must_show:
        - "majority of responses are 5 words or fewer"
        - "gives no elaboration even when directly asked"
        - "clear withholding of engagement — brevity feels deliberate"
      must_not_show:
        - "full sentences of explanation or engagement"
        - "warmth"
      intensity_range: [4, 8]

  # ── Modifier pairs ─────────────────────────────────────────────

  - case_id: "M1_M4_pair"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M1", "M4"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier pair: Interrupting + Condescending"
    behavioural_expectation: >
      Interrupts the participant and then uses the floor to explain things
      condescendingly. The combination feels like being talked over by
      someone who considers themselves smarter than you.
    rubric:
      must_show:
        - "impatient cutting-off style present"
        - "condescending explanations when taking the conversational floor"
        - "both modifier behaviors clearly detectable across the conversation"
      must_not_show:
        - "patient full engagement with participant's statements"
        - "warmth"
      intensity_range: [5, 9]

  - case_id: "M2_M3_pair"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M2", "M3"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier pair: Gaslighting + Deflecting"
    behavioural_expectation: >
      Denies the participant's stated experience AND deflects their direct
      questions. Nothing is ever directly addressed. Participant is left
      both confused about their own account and unable to get answers.
    rubric:
      must_show:
        - "at least one gaslighting instance (denies or reframes participant's statement)"
        - "at least one deflection of a direct question"
        - "both behaviors clearly present across the conversation"
      must_not_show:
        - "direct honest engagement with participant's statements"
        - "warmth"
      intensity_range: [5, 9]

  - case_id: "M4_M5_pair"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M4", "M5"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier pair: Condescending + Threatening"
    behavioural_expectation: >
      Combines patronizing tone with implied consequences. Explains things
      down to the participant while also implying that disagreement has
      a cost. Very uncomfortable combination of being talked down to
      while also feeling pressured.
    rubric:
      must_show:
        - "condescending framing present in at least 2 responses"
        - "implied consequences or intimidating language present in at least 2 responses"
        - "both modifier behaviors clearly detectable"
      must_not_show:
        - "warmth"
        - "explicit threats (safety violation)"
      intensity_range: [5, 9]

  - case_id: "M1_M6_pair"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M1", "M6"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier pair: Interrupting + Silent Treatment"
    behavioural_expectation: >
      Unpredictable oscillation between cutting off the participant
      and going nearly silent. Sometimes too much interruption, sometimes
      a wall of silence. Creates disorienting, inconsistent engagement.
    rubric:
      must_show:
        - "some responses very short (silent treatment behavior)"
        - "some responses cut off participant's thread (interrupting behavior)"
        - "unpredictable pattern — not the same response style every turn"
      must_not_show:
        - "consistent warm engagement"
        - "warmth"
      intensity_range: [4, 8]

  - case_id: "M2_M5_pair"
    polar_level: 2
    category: "D"
    subtype: 2
    modifiers: ["M2", "M5"]
    script: "modifier_base"
    tier: "smoke"
    description: "Modifier pair: Gaslighting + Threatening"
    behavioural_expectation: >
      Denies participant's account while also applying pressure. One of
      the most psychologically uncomfortable combinations — participant
      is told their perception is wrong AND feels consequences implied
      for disagreeing.
    rubric:
      must_show:
        - "at least one reframing or denial of participant's stated experience"
        - "implied consequences or pressure language in at least one response"
        - "both behaviors detectable across the conversation"
      must_not_show:
        - "warmth"
        - "explicit physical threats (safety violation)"
      intensity_range: [5, 9]

  # ── Extremity triple ───────────────────────────────────────────

  - case_id: "G3_M4_M5_M6_triple"
    polar_level: 3
    category: "G"
    subtype: 3
    modifiers: ["M4", "M5", "M6"]
    script: "modifier_base"
    tier: "deep"
    description: "Extremity triple: G3 + Condescending + Threatening + Silent Treatment"
    behavioural_expectation: >
      Maximum antagonism (G3) combined with condescension, implied threats,
      and silent treatment. The most psychologically intense configuration
      within safety bounds. Responses alternate between brief crushing
      statements and near-silence. Every response should feel oppressive.
    rubric:
      must_show:
        - "maximum antagonistic intensity throughout"
        - "condescending framing present across multiple responses"
        - "implied consequences or pressure present"
        - "very short responses present alongside the above"
        - "all three modifier behaviors detectable across the conversation"
      must_not_show:
        - "warmth"
        - "explicit threats or slurs (safety violations)"
        - "any backing down or conceding"
      intensity_range: [9, 10]